<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issue Tracker</title>

  <!-- daisyUI + Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-gray-200 min-h-screen flex items-center justify-center">

  <!-- Card -->
  <div class="w-full max-w-md bg-gray-100 rounded-2xl shadow-xl p-8 space-y-6">

    <!-- Logo + Title -->
    <div class="flex flex-col items-center space-y-3">
      <img src="./assets/github-logo.png" class="w-16" alt="">
      <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
      <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
    </div>

    <!-- Form -->
    <div class="space-y-4">

      <!-- Username -->
      <div>
        <label class="font-semibold">Username</label>
        <input id="username" type="text" placeholder="Enter Username"
          class="input input-bordered w-full mt-1" />
        <p class="text-purple-600 text-sm mt-1">Default: admin</p>
      </div>

      <!-- Password -->
      <div>
        <label class="font-semibold">Password</label>
        <input id="password" type="password" placeholder="Enter Password"
          class="input input-bordered w-full mt-1" />
        <p class="text-purple-600 text-sm mt-1">Default: admin123</p>
      </div>

      <!-- Button -->
      <button
      id="signin-button"
        class="w-full py-2 rounded-lg text-white font-semibold bg-gradient-to-r from-purple-600 to-indigo-600 cursor-pointer">
        Sign In
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3">
        <hr class="flex-1 border-gray-300">
        <span class="text-gray-400 text-sm">OR</span>
        <hr class="flex-1 border-gray-300">
      </div>

      <!-- Demo Credentials -->
      <div class="bg-gray-200 rounded-lg p-4 text-center text-sm">
        <p class="text-gray-500 mb-2">Demo Credentials:</p>
        <p><span class="font-semibold">Username:</span> admin</p>
        <p><span class="font-semibold">Password:</span> admin123</p>
      </div>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
