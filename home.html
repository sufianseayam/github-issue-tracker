<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
   <header>
  <nav>
    <div class="navbar bg-base-100 shadow-sm max-w-9xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">

      <!-- Logo + Title -->
      <div class="flex flex-col lg:flex-row items-center gap-2">
        <img class="w-12" src="./assets/github-logo.png" alt="">
        <a class="btn btn-ghost text-xl">Github Issue Tracker</a>
      </div>

      <!-- Search + Button -->
      <div class="flex flex-col md:flex-row gap-2 items-center">
        <input 
          type="text" 
          placeholder="Search Issues" 
          class="input input-bordered w-full md:w-auto"
        />

        <button class="btn btn-primary">
          <i class="fa-solid fa-plus"></i> New Issue
        </button>
      </div>

    </div>
  </nav>
</header>
<main>
    <section class=" button-comtainer container mx-auto shadow-md rounded-md">
        <div class="mt-10 max-w-7xl flex gap-2 py-5 px-4">
    <button id="all-btn" class="btn btn-primary rounded-sm">All</button>
    
    <button id="open-btn" class="btn btn-soft rounded-sm">Open </button>
    <button id="closed-btn" class="btn btn-sof rounded-sm">Closed</button>
    </section>
   

   </div>
<section id="issue container " class=" mt-10 max-w-7xl container mx-auto  flex justify-between items-center shadow-md min-h-20 rounded-md px-6">
    <div id="issue-count" class="flex items-center gap-2">
        <div class="bg-purple-300 rounded-2xl">
            <img src="./assets/Aperture.png" alt="">

        </div>
        <div>
            <h3 class="text-xl font-bold">50 Issues</h3>
            <p>Track and manage your project issues</p>
        </div>

    </div>
    <div class="flex gap-2">
        <h3><i class="fa-regular fa-circle bg-green-600 rounded-full"></i>open</h3>
        <h3><i class="fa-regular fa-circle bg-purple-600 rounded-full"></i>closed</h3>

    </div>


</section>
<section id="card-container" class=" mt-10 max-w-7xl container rounded-xl grid grid-cols-1 md:grid-cols-4 mx-auto gap-8"  >




 
  
</section>


</main>

<script src="index.js"></script>
</body>
</html>
